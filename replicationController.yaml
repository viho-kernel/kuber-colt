apiVersion: v1
kind: ReplicationController
metadata:
  name: ReplicationControllerDemo #RC-NAME
  labels:
    app: rc-1
    env: dev
    status: ok
spec:
  replicas: 2
  selector:
      app: rc-1
      env: dev
      status: ok
  template:
    metadata:
      name: RC-POD-1 #Pod-template
      labels:
        true: yes 
  spec:
    containers:
    - name: container-1
      image: nginx:latest
      ports:
      - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: service2
spec:
  selector:
    app: rc-1
    env: dev
    status: ok
  type: NodePort
  ports:
    - name: service2
      protocol: TCP
      port: 80
      targetPort: 80

