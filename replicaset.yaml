apiVersion: v1
kind: Namespace
metadata:
  name: amazondns
  labels:
    app: rs-1
    env: dev
    status: ok
---
apiVersion: app/v1
kind: ReplicaSet
metadata:
  name: amazondns
  labels:
    app: rs-1
    env: dev
    status: ok
spec:
  replicas: 2
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [rs-1]
      - key: env
        operator: In
        values: [dev]
      - key: status
        operator: In
        values: [ok]
  template:
    metadata:
      labels:
        app: rs-1
        env: dev
        status: ok
    spec:
      containers:
      - name: httpd 
      ports:
      - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  namespace: amazondns
  name: service2
spec:
  selector:
    app: rc-1
    env: dev
    status: ok
  type: LoadBalancer
  ports:
    - name: app1
      protocol: TCP
      port: 8080
      targetPort: 8080